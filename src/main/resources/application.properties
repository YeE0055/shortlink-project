# 1. 服务端口
server.port=9999

# 2. MySQL 数据库连接
spring.datasource.url=jdbc:mysql://localhost:3306/shortlink?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
spring.datasource.username=root
spring.datasource.password=12345678
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 3. Redis 配置 (默认无密码，如果有密码请加上 spring.data.redis.password=你的密码)
spring.data.redis.host=localhost
spring.data.redis.port=6379

# 4. MyBatis 配置
mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.type-aliases-package=com.example.shortlink